name: build

on:
  push:
    branches: [main]
  pull_request:

# Release build + ctest across all three target OSes. The built binary
# is uploaded as a per-OS artifact so non-developer testers can grab
# it from the Actions run page (and it can be promoted to a GitHub
# Release manually). Catch2 is fetched via CPM inside CMakeLists.txt
# when BUILD_TESTING is ON.

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_path: build/B33p_artefacts/Release/b33p
          - os: macos-latest
            binary_path: build/B33p_artefacts/Release/b33p.app
          - os: windows-latest
            binary_path: build/B33p_artefacts/Release/b33p.exe

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.os }}-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ matrix.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        # --parallel 2 caps concurrent compile jobs so the runner does
        # not OOM. Since adding B33pRenderVoice as a second executable,
        # ubuntu-latest (GCC Debug) was OOM-thrashing with unbounded
        # parallelism and timing out near the ~48 minute mark. Two
        # parallel compile jobs keeps peak memory inside the runner's
        # budget; wall-clock build time stays under 15 minutes.
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel 2

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: b33p-${{ matrix.os }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
