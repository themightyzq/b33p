name: build

on:
  push:
    branches: [main]
  pull_request:

# Release build + ctest across all three target OSes. The built bundles
# (Standalone + VST3 on every OS, plus AU on macOS) are uploaded as a
# per-OS artifact so non-developer testers can grab them from the
# Actions run page. The artifact contains the whole Release/ tree so
# every shipping format is in one download. Catch2 is fetched via CPM
# inside CMakeLists.txt when BUILD_TESTING is ON.

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.os }}-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ matrix.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        # --parallel 2 caps concurrent compile jobs so the runner does
        # not OOM. Since adding B33pRenderVoice as a second executable,
        # ubuntu-latest (GCC Debug) was OOM-thrashing with unbounded
        # parallelism and timing out near the ~48 minute mark. Two
        # parallel compile jobs keeps peak memory inside the runner's
        # budget; wall-clock build time stays under 15 minutes.
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel 2

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ env.CMAKE_BUILD_TYPE }}

      # pluginval — format-conformance check on the built VST3.
      # REVIEW-AUDIO #10. Informational for now (continue-on-error);
      # flip to blocking after one clean pass on every platform.
      # `--strictness-level 5` is the typical release gate;
      # --validate-in-process keeps the report alongside the runner log.
      - name: pluginval (VST3) — informational
        continue-on-error: true
        shell: bash
        run: |
          set -e
          PV_DIR="$RUNNER_TEMP/pluginval"
          mkdir -p "$PV_DIR"
          case "${{ runner.os }}" in
            Linux)
              curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip -o "$PV_DIR/pv.zip"
              unzip -q "$PV_DIR/pv.zip" -d "$PV_DIR"
              chmod +x "$PV_DIR/pluginval"
              PV="$PV_DIR/pluginval"
              VST3=$(find build/B33p_artefacts/Release/VST3 -name 'b33p.vst3' | head -1)
              ;;
            macOS)
              curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o "$PV_DIR/pv.zip"
              unzip -q "$PV_DIR/pv.zip" -d "$PV_DIR"
              PV="$PV_DIR/pluginval.app/Contents/MacOS/pluginval"
              VST3=$(find build/B33p_artefacts/Release/VST3 -name 'b33p.vst3' -type d | head -1)
              ;;
            Windows)
              curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -o "$PV_DIR/pv.zip"
              powershell -Command "Expand-Archive -Path '$PV_DIR/pv.zip' -DestinationPath '$PV_DIR'"
              PV="$PV_DIR/pluginval.exe"
              VST3=$(find build/B33p_artefacts/Release/VST3 -name 'b33p.vst3' -type d | head -1)
              ;;
          esac
          echo "pluginval: $PV"
          echo "VST3:      $VST3"
          "$PV" --strictness-level 5 --validate-in-process --validate "$VST3" || echo "pluginval finished non-zero (informational)"

      # auval — macOS-only AU conformance. Also informational while we
      # bring the report clean. Requires installing the AU into the
      # user's Components folder for the runner to see it.
      - name: auval (AU, macOS) — informational
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          set -e
          AU_SRC=$(find build/B33p_artefacts/Release/AU -name 'b33p.component' -type d | head -1)
          AU_DEST="$HOME/Library/Audio/Plug-Ins/Components/b33p.component"
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          rsync -a --delete "$AU_SRC/" "$AU_DEST/"
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          # Extract type / subtype / manuf from the Info.plist so this
          # job doesn't have to hard-code them and stay in sync with
          # juce_add_plugin's PRODUCT_NAME / manufacturer.
          PLIST="$AU_DEST/Contents/Info.plist"
          TYPE=$(plutil -extract "AudioComponents.0.type"            raw -o - "$PLIST")
          SUB=$(plutil -extract  "AudioComponents.0.subtype"         raw -o - "$PLIST")
          MFR=$(plutil -extract  "AudioComponents.0.manufacturer"    raw -o - "$PLIST")
          echo "auval: -strict -v $TYPE $SUB $MFR"
          auval -strict -v "$TYPE" "$SUB" "$MFR" || echo "auval finished non-zero (informational)"

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: b33p-${{ matrix.os }}
          # Whole Release/ tree captures Standalone + VST3 (every OS)
          # plus AU (macOS only). The juce_add_plugin output layout
          # places each format under its own subdirectory; the
          # uploaded artifact mirrors that layout.
          path: |
            build/B33p_artefacts/Release/Standalone
            build/B33p_artefacts/Release/VST3
            build/B33p_artefacts/Release/AU
          if-no-files-found: error

  # ASAN + UBSAN run on Linux only. Sanitizers add ~30% runtime overhead
  # but catch heap bugs, use-after-free, and signed-overflow-style UB the
  # unit suite can't surface on its own. Only the test target is built —
  # instrumenting Standalone/VST3/AU adds CI time without catching bugs
  # the test suite already exercises. Apple Clang on a Universal binary
  # cannot enable sanitizers, so macOS is intentionally excluded.
  sanitizers:
    name: ubuntu-latest (asan + ubsan)
    runs-on: ubuntu-latest

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache
      # RelWithDebInfo keeps optimizations but ships debug info so
      # sanitizer stack traces point at the right line.
      CMAKE_BUILD_TYPE: RelWithDebInfo
      # Fail fast on the first finding so CI surfaces the actual issue
      # instead of cascading follow-on errors.
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:strict_string_checks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          # Shared key with the main build job's ubuntu-latest entry —
          # CPM_SOURCE_CACHE stores JUCE source only; instrumented vs
          # non-instrumented compile artefacts don't live here.
          key: cpm-ubuntu-latest-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-ubuntu-latest-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure (asan + ubsan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DB33P_ENABLE_SANITIZERS=ON

      - name: Build tests
        # Only B33pTests + its dependencies. The plugin/standalone
        # targets aren't shipped from this job; building them under
        # sanitizers wastes CI time without extra bug coverage.
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target B33pTests --parallel 2

      - name: Run sanitized test suite
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ env.CMAKE_BUILD_TYPE }}

  # Static analysis over b33p's own sources. BLOCKING: the first-pass backlog
  # is cleared, so any finding fails the job (WarningsAsErrors='*' in
  # .clang-tidy). The check set is curated for real bug patterns; new code
  # must stay clean or add a justified NOLINT.
  clang-tidy:
    name: ubuntu-latest (clang-tidy)
    runs-on: ubuntu-latest

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v5
        with:
          # Shared key with the build job's ubuntu-latest entry — only JUCE
          # source lives here, not compile artefacts.
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-ubuntu-latest-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-ubuntu-latest-

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Pin the clang-tidy version so the blocking gate is deterministic:
          # ubuntu-latest's default `clang-tidy` floats with the runner image,
          # and a newer clang-tidy surfaces new checks that would spontaneously
          # red-line main with no code change. clang-tidy-18 matches what the
          # gate was tuned against. (If a future runner drops 18, bump this pin
          # deliberately and clear any new findings — don't let it float.)
          sudo apt-get install -y clang-tidy-18 \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev
          clang-tidy-18 --version

      - name: Configure (export compile commands)
        # No build needed: clang-tidy compiles each TU itself using the
        # flags in compile_commands.json. Configure also fetches JUCE via
        # CPM so the module headers our sources include are on disk.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy over Source/
        run: |
          # NB: GitHub runs this under `bash -e`. Disable errexit so a
          # non-zero clang-tidy/xargs DOESN'T abort the script before the
          # diagnostics are printed — we capture the status and exit with it
          # at the end instead. (Without this the job fails silently.)
          set +e
          # Only b33p's own translation units. Parallelised across cores;
          # each TU still parses heavy JUCE headers, so this is the slow
          # part. --quiet drops the per-file "N warnings generated" noise.
          # WarningsAsErrors='*' makes clang-tidy exit non-zero on any
          # finding; xargs then exits non-zero, which we propagate so the
          # job fails (blocking).
          find "$PWD/Source" -name '*.cpp' -print0 \
            | xargs -0 -P "$(nproc)" -I{} clang-tidy-18 -p build --quiet "{}" \
            > tidy.log 2>&1 ; status=$?
          echo "---- clang-tidy summary ----"
          findings=$(grep -cE 'warning:|error:' tidy.log || true)
          echo "clang-tidy findings: ${findings:-0}"
          # Echo the distinct check names that fired, with counts.
          echo "---- by check ----"
          grep -oE '\[[a-z0-9.-]+\]$' tidy.log | sort | uniq -c | sort -rn || true
          echo "---- full output ----"
          cat tidy.log
          # Fail the job if any clang-tidy invocation reported a finding.
          exit $status
