name: build

on:
  push:
    branches: [main]
  pull_request:

# Release build + ctest across all three target OSes. The built bundles
# (Standalone + VST3 on every OS, plus AU on macOS) are uploaded as a
# per-OS artifact so non-developer testers can grab them from the
# Actions run page. The artifact contains the whole Release/ tree so
# every shipping format is in one download. Catch2 is fetched via CPM
# inside CMakeLists.txt when BUILD_TESTING is ON.

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.os }}-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ matrix.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        # --parallel 2 caps concurrent compile jobs so the runner does
        # not OOM. Since adding B33pRenderVoice as a second executable,
        # ubuntu-latest (GCC Debug) was OOM-thrashing with unbounded
        # parallelism and timing out near the ~48 minute mark. Two
        # parallel compile jobs keeps peak memory inside the runner's
        # budget; wall-clock build time stays under 15 minutes.
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel 2

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: b33p-${{ matrix.os }}
          # Whole Release/ tree captures Standalone + VST3 (every OS)
          # plus AU (macOS only). The juce_add_plugin output layout
          # places each format under its own subdirectory; the
          # uploaded artifact mirrors that layout.
          path: |
            build/B33p_artefacts/Release/Standalone
            build/B33p_artefacts/Release/VST3
            build/B33p_artefacts/Release/AU
          if-no-files-found: error
