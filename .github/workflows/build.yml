name: build

on:
  push:
    branches: [main]
  pull_request:

# Phase 0 stub: debug build across all three target OSes, no tests.
# Catch2 + ctest step lands in Phase 1 alongside the first DSP unit tests.

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache
      CMAKE_BUILD_TYPE: Debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CPM sources (JUCE and friends)
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ matrix.os }}-juce-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ matrix.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel
